<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Register - Campus Store</title></head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<h2>Create an Account</h2>

<p th:if="${message}" style="color:green;" th:text="${message}"></p>
<p th:if="${error}"   style="color:red;"   th:text="${error}"></p>

<form th:action="@{/register}" method="post">
    <div>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required>
    </div>
    <br>
    <div>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"
               placeholder="e.g. alice@example.com" required>
    </div>
    <br>
    <div>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"
               placeholder="Min 6 chars, include a special character" required>
        <br>
        <small style="color:gray;">
            Must be at least 6 characters and contain at least one special character
            (e.g. !, @, #, $, %)
        </small>
    </div>
    <br>
    <button type="submit">Register</button>
    &nbsp;
    <a href="/login">Already have an account? Login</a>
</form>

</body>
</html>
