<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Product Form - Campus Store</title></head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<h2 th:text="${isNew} ? 'Create New Product' : 'Edit Product'">Product Form</h2>

<p th:if="${message}" style="color:green;" th:text="${message}"></p>
<p th:if="${error}"   style="color:red;"   th:text="${error}"></p>

<form th:action="${isNew} ? @{/admin/product/create} : @{/admin/product/{id}/edit(id=${product.id})}"
      method="post">

    <div>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required
               th:value="${product != null ? product.name : ''}">
    </div>
    <br>
    <div>
        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="3"
                  th:text="${product != null ? product.description : ''}"></textarea>
    </div>
    <br>
    <div>
        <label for="price">Price:</label><br>
        <input type="number" step="0.01" id="price" name="price" required
               th:value="${product != null ? product.price : ''}">
    </div>
    <br>
    <div>
        <label for="stockQty">Stock Quantity:</label><br>
        <input type="number" id="stockQty" name="stockQty" required
               th:value="${product != null ? product.stockQty : ''}">
    </div>
    <br>
    <div>
        <label for="categoryId">Category:</label><br>
        <select id="categoryId" name="categoryId" required>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${product != null && product.category != null && product.category.id == cat.id}">
            </option>
        </select>
    </div>
    <br>
    <button type="submit" th:text="${isNew} ? 'Create Product' : 'Update Product'">Save</button>
    <a href="/admin/dashboard">Cancel</a>
</form>

</body>
</html>
